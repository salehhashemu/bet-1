<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>پیش‌بینی جام جهانی ۲۰۲۶</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="mobile-container">

        <header class="app-header">
            <div class="header-right-side">
                <h1 id="welcomeMessage">در حال بارگذاری…</h1>
                <button id="globalResultsBtn" class="btn-results-nav">جدول نتایج</button>
            </div>
            <div style="display:flex; gap:6px; align-items:center;">
                <button id="usersLastVisitBtn" class="btn-results-nav">کاربران</button>
                <button id="logoutBtn" class="btn-logout-text">خروج</button>
            </div>
        </header>

        <main class="app-content">

            <!-- پنل ادمین -->
            <div class="admin-only">

                <section class="card">
                    <p class="section-title">مدیریت کاربران</p>
                    <div class="mobile-form">
                        <input type="text" id="newUsername" placeholder="نام کاربر جدید">
                        <input type="text" id="newUserPassword" placeholder="رمز عبور">
                        <button id="addUserBtn" class="btn-primary">افزودن کاربر</button>
                    </div>
                    <div class="list-wrapper" id="userListWrapper"></div>
                </section>

                <section class="card">
                    <p class="section-title">مدیریت تیم‌ها</p>
                    <div class="mobile-form">
                        <input type="text" id="teamNameInput" placeholder="نام تیم — مثلاً: برزیل">
                        <button id="addTeamBtn" class="btn-primary">افزودن تیم</button>
                    </div>
                    <div class="chips-container" id="teamsContainer"></div>
                </section>

                <section class="card">
                    <p class="section-title">تعریف بازی‌ها</p>
                    <div class="mobile-form">
                        <input type="text" id="folderNameInput" placeholder="نام گروه — مثلاً: مرحله گروهی">
                        <button id="addFolderBtn" class="btn-primary">ساخت گروه</button>
                    </div>
                    <div class="match-creator-box">
                        <h4>افزودن بازی جدید</h4>
                        <div class="form-group-spacing">
                            <select id="matchFolderSelect"><option value="">انتخاب گروه…</option></select>
                            <select id="matchHomeSelect"><option value="">تیم میزبان…</option></select>
                            <select id="matchAwaySelect"><option value="">تیم مهمان…</option></select>
                            <div style="display:flex; gap:8px;">
                                <input type="date" id="matchDateInput" class="custom-datetime-input" title="تاریخ بازی">
                                <input type="time" id="matchTimeInput" class="custom-datetime-input" title="ساعت بازی">
                            </div>
                            <button id="addMatchBtn" class="btn-success">ثبت بازی</button>
                        </div>
                    </div>
                </section>

            </div>

            <!-- بازدید کاربران -->
            <section class="card" id="lastVisitSection" style="display:none; margin-bottom:12px;">
                <p class="section-title">آخرین بازدید کاربران</p>
                <div class="list-wrapper" id="lastVisitListWrapper">در حال بارگذاری…</div>
            </section>

            <!-- بازی‌ها -->
            <section class="card">
                <p class="section-title">بازی‌های جام جهانی ۲۰۲۶</p>
                <div id="displayFoldersContainer"></div>
            </section>

        </main>
    </div>

    <script src="rewardRegistration.js"></script>
    <script src="winnerAnnouncer.js"></script>
    <script src="dashboard.js"></script>
    <script src="navigation.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>نتایج و رتبه‌بندی — جام جهانی ۲۰۲۶</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-elevated: var(--card);
            --bg-card: var(--card-2);
            --bg-base: var(--black);
            --bg-hover: var(--card-hover);
            --bg-deep: var(--black);
            --border-subtle: var(--border);
            --border-mid: var(--border-2);
            --border-active: var(--border-pink);
            --accent-dim: var(--pink-dim);
            --accent-glow: var(--pink-glow);
            --accent: var(--pink);
            --text-primary: var(--text-1);
            --text-secondary: var(--text-2);
            --text-muted: var(--text-3);
        }
    </style>
<style>
        /* استایل‌های اختصاصی صفحه نتایج */
        .results-tabs {
            display: flex;
            gap: 4px;
            background: var(--card);
            border-radius: var(--radius-md);
            padding: 4px;
            margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text-3);
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: var(--card-2);
            color: var(--text-1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* رتبه‌بندی */
        .lb-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 15px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 6px;
            transition: border-color 0.15s;
            animation: fadeUp 0.3s ease both;
        }
        .lb-row:hover { border-color: var(--border-2); }
        .lb-row.is-me {
            border-color: rgba(240,192,64,0.35);
            background: var(--gold-dim);
        }

        .lb-left { display: flex; align-items: center; gap: 12px; }
        .lb-meta { display: flex; flex-direction: column; gap: 2px; }
        .lb-name { font-size: 17px; font-weight: 600; color: var(--text-1); }
        .lb-name.is-me { color: var(--gold); }
        .lb-sub  { font-size: 11px; color: var(--text-3); }
        .lb-score { font-size: 16px; font-weight: 700; color: var(--pink); }
        .lb-last-points {
            font-size: 11px;
            font-weight: 800;
            color: var(--green);
            background: rgba(52,211,153,0.12);
            border: 1px solid rgba(52,211,153,0.3);
            padding: 2px 7px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .lb-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .lb-settled-ratio {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-3);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2px 7px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .lb-rank-change {
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }
        .lb-rank-change.up { color: var(--green); }
        .lb-rank-change.down { color: var(--red); }
        .lb-rank-change.same { color: var(--text-3); }

        /* آکاردئون کاربران */
        .user-accord {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 6px;
            overflow: hidden;
            animation: fadeUp 0.3s ease both;
        }
        .user-accord-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 15px;
            background: var(--card);
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
        }
        .user-accord-head:hover { background: var(--card-hover); }

        .user-accord-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-accord-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: var(--pink-dim);
            border: 1px solid rgba(255,59,78,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            color: var(--pink);
            font-weight: 700;
            flex-shrink: 0;
        }
        .accord-toggle {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: var(--card-2);
            border: 1px solid var(--border);
            color: var(--text-3);
            font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, background 0.15s;
            flex-shrink: 0;
        }
        .user-accord.open .accord-toggle { transform: rotate(180deg); background: var(--pink-dim); color: var(--pink); }

        .user-accord-body {
            display: none;
            padding: 12px;
            background: var(--card-2);
            border-top: 1px solid var(--border);
        }
        .user-accord.open .user-accord-body { display: block; }

        /* پوشه درون آکاردئون */
        .inner-folder {
            margin-bottom: 8px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .inner-folder-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 12px;
            background: var(--card);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
            transition: background 0.15s;
        }
        .inner-folder-head:hover { background: var(--card-hover); }

        .inner-folder-body { display: none; padding: 8px; }
        .inner-folder.open .inner-folder-body { display: block; }

        /* ردیف بازی در آکاردئون */
        .pred-match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: var(--card);
            margin-bottom: 5px;
            font-size: 12px;
            gap: 8px;
        }
        .pred-team { flex: 1; font-weight: 600; color: var(--text-1); }
        .pred-team.left  { text-align: left; }
        .pred-team.right { text-align: right; }

        .pred-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            min-width: 100px;
            flex-wrap: wrap;
        }
        .pred-score {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 700;
            font-size: 13px;
        }
        .pred-score.user-pred { color: var(--pink); }
        .pred-score.real-score { color: var(--gold); }
        .pred-label { font-size: 10px; color: var(--text-3); }
        .no-pred-badge {
            color: var(--red);
            font-size: 11px;
            font-weight: 600;
            background: var(--red-dim);
            padding: 2px 8px;
            border-radius: 4px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

    <div class="mobile-container" style="max-width: 560px;">

        <header class="app-header" style="display:flex;align-items:center;justify-content:space-between;gap:8px;direction:ltr;">
            <div style="display:flex;gap:6px;align-items:center;">
                <button onclick="window.location.href='dashboard.html'" class="btn-results-nav" dir="rtl">← بازگشت</button>
                <button id="backupBtn" class="btn-results-nav" style="display:none;background:linear-gradient(135deg,rgba(52,211,153,0.15),rgba(52,211,153,0.08)) !important;border-color:rgba(52,211,153,0.25) !important;color:#34d399 !important;"><span dir="rtl">📥 بکاپ</span></button>
            </div>
            <h1 style="color:var(--gold);">جدول نتایج</h1>
        </header>

        <main class="app-content">

            <!-- تب‌ها -->
            <div class="results-tabs">
                <button class="tab-btn active" onclick="switchTab('leaderboard', this)">رتبه‌بندی</button>
                <button class="tab-btn" onclick="switchTab('challenge', this)">🏆 چالش</button>
                <button class="tab-btn" onclick="switchTab('predictions', this)">پیش‌بینی‌ها</button>
            </div>

            <!-- تب رتبه‌بندی -->
            <div class="tab-panel active" id="panel-leaderboard">
                <!-- انتخاب‌گر رتبه‌بندی بر اساس بازی -->
                <div id="matchRankingSelector" style="margin-bottom:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;">
                    <div style="font-size:12px;font-weight:800;color:var(--text-1);margin-bottom:10px;">🎯 رتبه‌بندی بر اساس بازی</div>
                    <select id="matchRankingSelect" onchange="showMatchRanking(this.value)"
                        style="width:100%;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,59,78,0.4);background:rgba(255,59,78,0.10);color:var(--text-1);font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;direction:rtl;appearance:none;-webkit-appearance:none;background-image:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23ff3b4e%22 stroke-width=%223%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><polyline points=%226 9 12 15 18 9%22/></svg>');background-repeat:no-repeat;background-position:left 14px center;padding-left:36px;">
                        <option value="all">🏆 رتبه‌بندی کل</option>
                    </select>
                </div>
                <div id="leaderboardContainer">
                    <div style="text-align:center; padding:40px 0; color:var(--text-3); font-size:13px;">
                        در حال محاسبه امتیازات…
                    </div>
                </div>
            </div>

            <!-- تب چالش -->
            <div class="tab-panel" id="panel-challenge">
                <div id="challengeLeaderboardContainer">
                    <div style="text-align:center; padding:40px 0; color:var(--text-3); font-size:13px;">
                        در حال بارگذاری چالش…
                    </div>
                </div>
            </div>

            <!-- تب پیش‌بینی‌ها -->
            <div class="tab-panel" id="panel-predictions">
                <div id="usersPredictionsContainer">
                    <div style="text-align:center; padding:40px 0; color:var(--text-3); font-size:13px;">
                        در حال بارگذاری…
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://rzvuvrfrkbsthzzimbce.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6dnV2cmZya2JzdGh6emltYmNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzIxOTEsImV4cCI6MjA5NjI0ODE5MX0.M7db1b124sf9T6-NBewgVPqix1koaytYG-5lJqNnXn8";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // expose برای rewardRegistration.js
        window.supabaseClient = supabaseClient;

        const currentLoggedInUser = localStorage.getItem('loggedInUser') || '';
        let openedUsers = [];
        let openedUserFolders = [];

        // ── استایل دکمه‌های رتبه‌بندی بازی ──
        (function() {
            var s = document.createElement('style');
            s.textContent = `.match-rank-btn{transition:all 0.15s;} .match-rank-btn.active{background:rgba(255,59,78,0.2)!important;color:var(--pink)!important;border-color:rgba(255,59,78,0.5)!important;box-shadow:0 0 0 1px rgba(255,59,78,0.2);}`;
            document.head.appendChild(s);
        })();

        window._rankingData = null;

        window.showMatchRanking = function(matchId) {
            var sel = document.getElementById('matchRankingSelect');
            if (sel && sel.value !== String(matchId)) sel.value = String(matchId);

            var lbEl = document.getElementById('leaderboardContainer');
            var d = window._rankingData;
            if (!d) return;

            if (matchId === 'all') {
                renderLeaderboard(lbEl, d.leaderboardArray, d.totalMatchesCount, d.settledMatchesCount,
                    d.premiumSet, d.prevRanks, d.lastMatchPoints, d.lastSettledMatch, d.currentLoggedInUser);
                return;
            }

            var match = d.matches.find(function(m) { return String(m.id) === String(matchId); });
            if (!match || match.home_score === null || match.away_score === null) {
                lbEl.innerHTML = '<p style="text-align:center;color:var(--text-3);padding:20px;">نتیجه این بازی هنوز ثبت نشده است.</p>';
                return;
            }

            // ─── بازی‌های تعیین‌شده به ترتیب، و بازی‌های تا پایان بازی انتخاب‌شده ───
            var settledOrdered = d.matches.filter(function(m) {
                return m.home_score !== null && m.away_score !== null;
            }).sort(function(a, b) { return Number(a.id) - Number(b.id); });
            var gameIndex = settledOrdered.findIndex(function(m) { return String(m.id) === String(matchId); });
            var upToMatches = settledOrdered.slice(0, gameIndex + 1);
            var gameNumber = gameIndex + 1;

            // ─── محاسبه امتیاز تجمعی هر کاربر تا پایان این بازی ───
            var rows = d.users.map(function(u) {
                var cum = 0;
                var predictedCount = 0;
                upToMatches.forEach(function(m) {
                    var pred = d.scoreIdx[u.username + '_' + String(m.id)];
                    if (!pred) return;
                    var prH = parseInt(pred.home_prediction), prA = parseInt(pred.away_prediction);
                    if (isNaN(prH) || isNaN(prA)) return;
                    var reH = parseInt(m.home_score), reA = parseInt(m.away_score);
                    var rW = reH > reA ? 1 : reA > reH ? 2 : 0;
                    var pW = prH > prA ? 1 : prA > prH ? 2 : 0;
                    if (prH === reH && prA === reA) cum += 10;
                    else if (rW === pW && (reH - reA) === (prH - prA)) cum += 7;
                    else if (rW === pW) cum += 5;
                    else cum += 2;
                    predictedCount++;
                });
                return { username: u.username, score: cum, predictedCount: predictedCount };
            }).sort(function(a, b) { return b.score - a.score; });

            lbEl.innerHTML =
                '<div style="background:var(--gold-dim);border:1px dashed rgba(240,192,64,0.25);border-radius:10px;padding:10px 14px;margin-bottom:12px;text-align:center;font-size:12px;color:var(--gold);">' +
                    'امتیاز تجمعی تا پایان <strong>بازی ' + gameNumber + '</strong>' +
                '</div>' +
                rows.map(function(r, i) {
                    var rank = i + 1;
                    var rc = rank <= 3 ? 'rank-' + rank : '';
                    var isMe = r.username === d.currentLoggedInUser;
                    return '<div class="lb-row' + (isMe ? ' is-me' : '') + '" style="animation-delay:' + (i*0.04) + 's">' +
                        '<div class="lb-left">' +
                            '<div class="rank-badge ' + rc + '">' + rank + '</div>' +
                            '<div class="lb-meta">' +
                                '<span class="lb-name' + (isMe ? ' is-me' : '') + '">' + r.username + '</span>' +
                                '<span class="lb-sub">' + r.predictedCount + ' از ' + gameNumber + ' پیش‌بینی</span>' +
                            '</div>' +
                        '</div>' +
                        '<div class="lb-right">' +
                            '<div class="lb-score">' + r.score + '</div>' +
                        '</div>' +
                    '</div>';
                }).join('');
        };

        function renderLeaderboard(lbEl, leaderboardArray, totalMatchesCount, settledMatchesCount, premiumSet, prevRanks, lastMatchPoints, lastSettledMatch, curUser) {
            if (!lbEl) return;
            lbEl.innerHTML = '';
            leaderboardArray.forEach(function(item, i) {
                var rank = i + 1;
                var rc = rank <= 3 ? 'rank-' + rank : '';
                var isMe = item.username === curUser;
                var badge = premiumSet.has(item.username) ? '<span class="premium-badge">چالش</span>' : '';
                var prevRank = prevRanks[item.username];
                var diff = prevRank !== undefined ? prevRank - rank : 0;
                var arrow = '', cls = '';
                if (prevRank !== undefined) {
                    if (diff > 0) { cls = 'up'; arrow = diff >= 3 ? '▲▲' : '▲'; }
                    else if (diff < 0) { cls = 'down'; arrow = diff <= -3 ? '▼▼' : '▼'; }
                    else { cls = 'same'; arrow = '➖'; }
                }
                var rankChangeBadge = prevRank !== undefined ? '<span class="lb-rank-change ' + cls + '">' + arrow + '</span>' : '';
                var pts = lastSettledMatch ? lastMatchPoints[item.username] : undefined;
                var lastPointsBadge = pts !== undefined ? '<span class="lb-last-points">+' + pts + '</span>' : '';
                var settledRatio = '<span class="lb-settled-ratio">' + item.settledPredCount + '/' + settledMatchesCount + '</span>';
                var row = document.createElement('div');
                row.className = 'lb-row' + (isMe ? ' is-me' : '');
                row.style.animationDelay = (i * 0.04) + 's';
                row.innerHTML =
                    '<div class="lb-left">' +
                        '<div class="rank-badge ' + rc + '">' + rank + '</div>' +
                        '<div class="lb-meta">' +
                            '<span class="lb-name' + (isMe ? ' is-me' : '') + '" style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">' + item.username + ' ' + badge + '</span>' +
                            '<span class="lb-sub">' + item.predCount + ' از ' + totalMatchesCount + ' پیش‌بینی</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="lb-right">' +
                        rankChangeBadge +
                        '<div style="display:flex;align-items:center;gap:6px;">' +
                            '<div class="lb-score">' + item.score + '</div>' +
                            settledRatio + lastPointsBadge +
                        '</div>' +
                    '</div>';
                lbEl.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (!localStorage.getItem('userRole')) {
                window.location.href = 'index.html';
                return;
            }
            // بررسی آیا از داشبورد با فیلتر بازی خاص آمده‌ایم
            var filterMatchId = localStorage.getItem('filterMatchId');
            var filterMatchHome = localStorage.getItem('filterMatchHome');
            var filterMatchAway = localStorage.getItem('filterMatchAway');
            if (filterMatchId) {
                localStorage.removeItem('filterMatchId');
                localStorage.removeItem('filterMatchHome');
                localStorage.removeItem('filterMatchAway');
                window._filterMatchId = filterMatchId;
                window._filterMatchHome = filterMatchHome || '';
                window._filterMatchAway = filterMatchAway || '';
                // سوئیچ به تب پیش‌بینی‌ها
                document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
                document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
                var predTab = document.querySelector('.tab-btn[onclick*="predictions"]');
                if (predTab) predTab.classList.add('active');
                var predPanel = document.getElementById('panel-predictions');
                if (predPanel) predPanel.classList.add('active');
            }
            initResultsPage();
        });

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById('panel-' + tabId).classList.add('active');
        }

        async function initResultsPage() {
            var currentLoggedInUser = localStorage.getItem('loggedInUser') || '';
            var currentUserRole = localStorage.getItem('userRole') || 'user';
            var loadingHtml = '<div style="text-align:center;padding:30px 0;color:var(--text-3);font-size:13px;">در حال بارگذاری...</div>';
            var lbEl = document.getElementById('leaderboardContainer');
            var chEl = document.getElementById('challengeLeaderboardContainer');
            var usEl = document.getElementById('usersPredictionsContainer');
            if (lbEl) lbEl.innerHTML = loadingHtml;
            if (chEl) chEl.innerHTML = loadingHtml;
            if (usEl) usEl.innerHTML = loadingHtml;

            try {
                var results = await Promise.all([
                    supabaseClient.from('project_users').select('username, is_eligible_for_reward'),
                    supabaseClient.from('matches').select('*').order('id', { ascending: true }),
                    supabaseClient.from('teams').select('*'),
                    supabaseClient.from('folders').select('*').order('id', { ascending: true }),
                    supabaseClient.from('predictions').select('*'),
                    supabaseClient.rpc('get_server_time')
                ]);

                for (var qi = 0; qi < results.length; qi++) {
                    if (results[qi].error) throw new Error('DB error: ' + results[qi].error.message);
                }

                var users         = results[0].data || [];
                var matches       = results[1].data || [];
                var teams         = results[2].data || [];
                var folders       = results[3].data || [];
                var allPredictions = results[4].data || [];
                // زمان سرور برای مقایسه با زمان بازی‌ها (به وقت تهران UTC+3:30)
                var serverNowMs = results[5].data ? new Date(results[5].data).getTime() : Date.now();

                // آیا زمان یک بازی (به وقت تهران) فرا رسیده؟
                function isMatchStarted(match) {
                    if (!match.match_date || !match.match_time) return true; // بدون تاریخ = نمایش
                    // تفسیر تاریخ/ساعت ذخیره‌شده به‌عنوان وقت تهران (+03:30) — مستقل از تایم‌زون مرورگر
                    var t = String(match.match_time).length === 5 ? match.match_time + ':00' : match.match_time;
                    var matchUTC = new Date(match.match_date + 'T' + t + '+03:30').getTime();
                    return serverNowMs >= matchUTC;
                }

                var premiumSet = new Set(
                    users.filter(function(u) { return u.is_eligible_for_reward === true; })
                         .map(function(u) { return u.username; })
                );

                var teamsMap = {};
                teams.forEach(function(t) { teamsMap[t.id] = t.name; });

                var totalMatchesCount = matches.length;
                var settledMatchesCount = matches.filter(function(m) {
                    return m.home_score !== null && m.away_score !== null;
                }).length;

                var userScores = {};
                var userPredictionsCount = {};
                var userSettledPredictionsCount = {};
                users.forEach(function(u) {
                    userScores[u.username] = 0;
                    userPredictionsCount[u.username] = 0;
                    userSettledPredictionsCount[u.username] = 0;
                });

                // شمارش پیش‌بینی‌ها — با deduplicate بر اساس match_id برای هر کاربر
                var seenPreds = {}; // "username_matchId" -> true
                allPredictions.forEach(function(pred) {
                    if (userPredictionsCount[pred.username] === undefined) return;
                    var key = pred.username + '_' + String(pred.match_id);
                    if (seenPreds[key]) return; // تکراری — رد کن
                    var matchForPred = matches.find(function(m) { return String(m.id) === String(pred.match_id); });
                    if (matchForPred && pred.home_prediction !== null && pred.away_prediction !== null &&
                        pred.home_prediction !== '' && pred.away_prediction !== '') {
                        userPredictionsCount[pred.username]++;
                        if (matchForPred.home_score !== null && matchForPred.away_score !== null) {
                            userSettledPredictionsCount[pred.username]++;
                        }
                        seenPreds[key] = true;
                    }
                });

                // محاسبه امتیازات — با deduplicate کامل (اولین رکورد معتبر هر username+match)
                var SENTINEL_P = '99';
                var isValidP = function(p) {
                    return p.home_prediction !== null && p.away_prediction !== null &&
                        p.home_prediction !== '' && p.away_prediction !== '' &&
                        !(String(p.home_prediction) === SENTINEL_P && String(p.away_prediction) === SENTINEL_P);
                };
                // ساخت ایندکس: اولین رکورد معتبر برای هر username_matchId
                var scoreIdx = {};
                allPredictions
                    .filter(function(p) { return isValidP(p); })
                    .sort(function(a, b) { return Number(a.id) - Number(b.id); })
                    .forEach(function(pred) {
                        var key = pred.username + '_' + String(pred.match_id);
                        if (!scoreIdx[key]) scoreIdx[key] = pred;
                    });
                Object.keys(scoreIdx).forEach(function(key) {
                    var pred = scoreIdx[key];
                    if (!users.some(function(u) { return u.username === pred.username; })) return;
                    var match = matches.find(function(m) { return String(m.id) === String(pred.match_id); });
                    if (!match || match.home_score === null || match.away_score === null) return;
                    var prH = parseInt(pred.home_prediction), prA = parseInt(pred.away_prediction);
                    var reH = parseInt(match.home_score),    reA = parseInt(match.away_score);
                    if (isNaN(prH) || isNaN(prA) || isNaN(reH) || isNaN(reA)) return;
                    if (userScores[pred.username] === undefined) userScores[pred.username] = 0;
                    var rW = reH > reA ? 1 : reA > reH ? 2 : 0;
                    var pW = prH > prA ? 1 : prA > prH ? 2 : 0;
                    if (prH === reH && prA === reA)               userScores[pred.username] += 10;
                    else if (rW === pW && (reH-reA) === (prH-prA)) userScores[pred.username] += 7;
                    else if (rW === pW)                            userScores[pred.username] += 5;
                    else                                           userScores[pred.username] += 2;
                });

                // ─── امتیاز کسب‌شده در آخرین بازی تعیین‌شده (نتیجه‌دار) ───
                var settledMatches = matches.filter(function(m) {
                    return m.home_score !== null && m.away_score !== null;
                }).sort(function(a, b) { return Number(b.id) - Number(a.id); });

                var lastSettledMatch = settledMatches.length > 0 ? settledMatches[0] : null;
                var lastMatchPoints = {};

                if (lastSettledMatch) {
                    var reH2 = parseInt(lastSettledMatch.home_score), reA2 = parseInt(lastSettledMatch.away_score);
                    var rW2 = reH2 > reA2 ? 1 : reA2 > reH2 ? 2 : 0;

                    allPredictions.forEach(function(pred) {
                        if (String(pred.match_id) !== String(lastSettledMatch.id)) return;
                        if (!users.some(function(u) { return u.username === pred.username; })) return;
                        var prH = parseInt(pred.home_prediction), prA = parseInt(pred.away_prediction);
                        if (isNaN(prH) || isNaN(prA)) return;
                        var pW2 = prH > prA ? 1 : prA > prH ? 2 : 0;
                        var pts;
                        if (prH === reH2 && prA === reA2)                 pts = 10;
                        else if (rW2 === pW2 && (reH2-reA2) === (prH-prA)) pts = 7;
                        else if (rW2 === pW2)                             pts = 5;
                        else                                               pts = 2;
                        lastMatchPoints[pred.username] = pts;
                    });
                }

                function lastPointsBadge(username) {
                    if (!lastSettledMatch) return '';
                    var pts = lastMatchPoints[username];
                    if (pts === undefined) return '';
                    return '<span class="lb-last-points">+' + pts + '</span>';
                }

                function settledRatioBadge(item) {
                    return '<span class="lb-settled-ratio">' + item.settledPredCount + '/' + settledMatchesCount + '</span>';
                }

                var leaderboardArray = Object.keys(userScores).map(function(un) {
                    return {
                        username: un,
                        score: userScores[un],
                        predCount: userPredictionsCount[un] || 0,
                        settledPredCount: userSettledPredictionsCount[un] || 0
                    };
                }).sort(function(a, b) { return b.score - a.score; });

                // ─── محاسبه تغییر رتبه نسبت به بار قبل ───
                var prevRanksRaw = localStorage.getItem('prevLeaderboardRanks');
                var prevRanks = prevRanksRaw ? JSON.parse(prevRanksRaw) : {};
                var currentRanks = {};
                leaderboardArray.forEach(function(item, i) { currentRanks[item.username] = i + 1; });

                function rankChangeBadge(username, currentRank) {
                    var prevRank = prevRanks[username];
                    if (prevRank === undefined) return '';
                    var diff = prevRank - currentRank; // مثبت = صعود
                    var arrow = '';
                    var cls = '';
                    if (diff > 0) {
                        cls = 'up';
                        arrow = diff >= 3 ? '▲▲' : '▲';
                    } else if (diff < 0) {
                        cls = 'down';
                        arrow = diff <= -3 ? '▼▼' : '▼';
                    } else {
                        cls = 'same';
                        arrow = '➖';
                    }
                    return '<span class="lb-rank-change ' + cls + '">' + arrow + '</span>';
                }

                localStorage.setItem('prevLeaderboardRanks', JSON.stringify(currentRanks));

                // ─── ذخیره داده برای رتبه‌بندی بازی ───
                window._rankingData = {
                    users: users,
                    matches: matches,
                    teams: teams,
                    teamsMap: teamsMap,
                    leaderboardArray: leaderboardArray,
                    totalMatchesCount: totalMatchesCount,
                    settledMatchesCount: settledMatchesCount,
                    premiumSet: premiumSet,
                    prevRanks: prevRanks,
                    lastMatchPoints: lastMatchPoints,
                    lastSettledMatch: lastSettledMatch,
                    currentLoggedInUser: currentLoggedInUser,
                    scoreIdx: scoreIdx
                };

                // ─── ساخت آپشن‌های کشویی رتبه‌بندی بازی ───
                var rankSelect = document.getElementById('matchRankingSelect');
                if (rankSelect) {
                    // حفظ مقدار انتخاب‌شده فعلی
                    var prevVal = rankSelect.value || 'all';
                    rankSelect.innerHTML = '<option value="all">🏆 رتبه‌بندی کل</option>';
                    var settledForBtns = matches.filter(function(m) { return m.home_score !== null && m.away_score !== null; });
                    settledForBtns.forEach(function(m, idx) {
                        var opt = document.createElement('option');
                        opt.value = m.id;
                        opt.textContent = 'بازی ' + (idx + 1);
                        rankSelect.appendChild(opt);
                    });
                    // اگر مقدار قبلی هنوز معتبر است، حفظش کن
                    if (Array.prototype.some.call(rankSelect.options, function(o){return o.value===prevVal;})) {
                        rankSelect.value = prevVal;
                    }
                }

                // ─── رتبه‌بندی اصلی ───
                if (lbEl) {
                    renderLeaderboard(lbEl, leaderboardArray, totalMatchesCount, settledMatchesCount,
                        premiumSet, prevRanks, lastMatchPoints, lastSettledMatch, currentLoggedInUser);
                }

                // ─── رتبه‌بندی چالش ───
                var challengeArray = leaderboardArray.filter(function(item) { return premiumSet.has(item.username); });
                if (chEl) {
                    chEl.innerHTML = '';
                    var settledCount = matches.filter(function(m) { return m.home_score !== null && m.away_score !== null; }).length;
                    var isFinished = settledCount === 104 && totalMatchesCount === 104;

                    if (isFinished && challengeArray.length > 0) {
                        var champ = challengeArray[0];
                        var cb = document.createElement('div');
                        cb.style.cssText = 'background:linear-gradient(135deg,rgba(240,192,64,0.12),rgba(15,18,36,0.8));border:2px dashed #f0c040;border-radius:16px;padding:20px;text-align:center;margin-bottom:16px;';
                        cb.innerHTML =
                            '<div style="font-size:36px;margin-bottom:8px;">👑</div>' +
                            '<div style="font-size:13px;color:#ffee55;margin-bottom:6px;">برنده چالش مالی</div>' +
                            '<div style="background:linear-gradient(90deg,#f0c040,#ffee55);color:#000;padding:4px 18px;border-radius:50px;font-weight:900;display:inline-block;font-size:18px;margin-bottom:8px;">✨ ' + champ.username + ' ✨</div>' +
                            '<div style="font-size:12px;color:#8a8f98;">امتیاز: ' + champ.score + '</div>';
                        chEl.appendChild(cb);
                    }

                    if (challengeArray.length === 0) {
                        chEl.innerHTML = '<p style="text-align:center;color:var(--text-3);padding:30px 0;">هیچ کاربری در چالش مالی شرکت نکرده است.</p>';
                    } else {
                        challengeArray.forEach(function(item, i) {
                            var rank = i + 1;
                            var rc = rank <= 3 ? 'rank-' + rank : '';
                            var isMe = item.username === currentLoggedInUser;
                            var row = document.createElement('div');
                            row.className = 'lb-row' + (isMe ? ' is-me' : '');
                            row.style.animationDelay = (i * 0.04) + 's';
                            row.innerHTML =
                                '<div class="lb-left">' +
                                    '<div class="rank-badge ' + rc + '">' + rank + '</div>' +
                                    '<div class="lb-meta">' +
                                        '<span class="lb-name' + (isMe ? ' is-me' : '') + '" style="display:flex;align-items:center;gap:4px;">' +
                                            item.username +
                                            ' <span class="premium-badge">چالش</span>' +
                                        '</span>' +
                                        '<span class="lb-sub">' + item.predCount + ' از ' + totalMatchesCount + ' پیش‌بینی</span>' +
                                    '</div>' +
                                '</div>' +
                                '<div class="lb-right">' +
                                    rankChangeBadge(item.username, rank) +
                                    '<div style="display:flex;align-items:center;gap:6px;">' +
                                        '<div class="lb-score">' + item.score + '</div>' +
                                        settledRatioBadge(item) +
                                        lastPointsBadge(item.username) +
                                    '</div>' +
                                '</div>';
                            chEl.appendChild(row);
                        });
                    }
                }

                // ─── پیش‌بینی کاربران ───
                if (usEl) {
                    usEl.innerHTML = '';
                    if (users.length === 0) {
                        usEl.innerHTML = '<p style="text-align:center;color:var(--text-3);padding:30px 0;">کاربری یافت نشد.</p>';
                        return;
                    }

                    // نمایش پیش‌بینی‌های یک بازی خاص (وقتی از داشبورد با فیلتر آمده‌ایم)
                    if (window._filterMatchId) {
                        var fMatchId = String(window._filterMatchId);
                        var fHome = window._filterMatchHome || '';
                        var fAway = window._filterMatchAway || '';
                        var fMatch = matches.find(function(m) { return String(m.id) === fMatchId; });
                        var fRealH = (fMatch && fMatch.home_score !== null && fMatch.home_score !== undefined) ? fMatch.home_score : '—';
                        var fRealA = (fMatch && fMatch.away_score !== null && fMatch.away_score !== undefined) ? fMatch.away_score : '—';

                        var matchPreds = allPredictions.filter(function(p) {
                            return String(p.match_id) === fMatchId && p.home_prediction !== null && p.away_prediction !== null && p.home_prediction !== '' && p.away_prediction !== '';
                        });
                        var predUserSet = {};
                        matchPreds.forEach(function(p) { if (!predUserSet[p.username]) predUserSet[p.username] = p; });

                        var reH3 = parseInt(fRealH), reA3 = parseInt(fRealA);
                        var hasResult3 = !isNaN(reH3) && !isNaN(reA3);

                        function calcPts3(prH, prA) {
                            if (!hasResult3) return null;
                            var rW = reH3>reA3?1:(reA3>reH3?2:0), pW = prH>prA?1:(prA>prH?2:0);
                            if (prH===reH3&&prA===reA3) return 10;
                            if (rW===pW&&(reH3-reA3)===(prH-prA)) return 7;
                            if (rW===pW) return 5;
                            return 2;
                        }

                        var groups3 = {};
                        Object.values(predUserSet).forEach(function(p) {
                            var key = p.home_prediction + '-' + p.away_prediction;
                            if (!groups3[key]) {
                                var pts3 = calcPts3(parseInt(p.home_prediction), parseInt(p.away_prediction));
                                groups3[key] = { home: p.home_prediction, away: p.away_prediction, points: pts3, users: [] };
                            }
                            groups3[key].users.push(p.username);
                        });
                        var sortedG3 = Object.values(groups3).sort(function(a, b) {
                            if (hasResult3 && (b.points ?? -1) !== (a.points ?? -1)) return (b.points ?? -1) - (a.points ?? -1);
                            return b.users.length - a.users.length;
                        });

                        var notPred3 = users.map(function(u) { return u.username; })
                            .filter(function(n) { return !predUserSet[n]; })
                            .sort(function(a,b) { return a.localeCompare(b,'fa'); });

                        function ptsBadge3(pts) {
                            if (pts === null) return '';
                            var cfg = {
                                10: {fg:'var(--green)',bg:'rgba(52,211,153,0.15)',br:'rgba(52,211,153,0.3)'},
                                7:  {fg:'var(--pink)',bg:'rgba(255,59,78,0.15)',br:'rgba(255,59,78,0.3)'},
                                5:  {fg:'var(--gold)',bg:'rgba(240,192,64,0.15)',br:'rgba(240,192,64,0.3)'},
                                2:  {fg:'var(--text-3)',bg:'var(--card)',br:'var(--border)'}
                            };
                            var c = cfg[pts] || cfg[2];
                            return '<span style="font-size:11px;font-weight:800;color:'+c.fg+';background:'+c.bg+';border:1px solid '+c.br+';padding:3px 9px;border-radius:7px;white-space:nowrap;">⭐ '+pts+' امتیاز</span>';
                        }

                        var filterBox = document.createElement('div');
                        filterBox.style.cssText = 'background:var(--card);border:1px solid var(--border-2);border-radius:14px;padding:14px;margin-bottom:18px;';
                        filterBox.innerHTML =
                            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">' +
                                '<div style="font-size:13px;font-weight:800;color:var(--text-1);">👀 پیش‌بینی‌های این بازی</div>' +
                                '<button onclick="window._filterMatchId=null;this.closest(\'div[style]\').remove();" style="font-size:11px;background:var(--card-2);border:1px solid var(--border);color:var(--text-3);padding:4px 10px;border-radius:8px;cursor:pointer;font-family:var(--font);">✕ بستن</button>' +
                            '</div>' +
                            '<div style="background:var(--gold-dim);border:1px dashed rgba(240,192,64,0.25);border-radius:10px;padding:10px 12px;margin-bottom:10px;text-align:center;">' +
                                '<div style="font-size:10px;color:var(--gold);opacity:0.8;margin-bottom:4px;">نتیجه واقعی</div>' +
                                '<div style="display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;font-weight:800;color:var(--text-1);">' +
                                    '<span>'+fHome+'</span><span style="color:var(--gold);">'+fRealH+' – '+fRealA+'</span><span>'+fAway+'</span>' +
                                '</div>' +
                            '</div>' +
                            sortedG3.map(function(g) {
                                return '<div style="margin-bottom:10px;background:var(--card-2);border:1px solid var(--border);border-radius:10px;overflow:hidden;">' +
                                    '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,59,78,0.06);border-bottom:1px solid var(--border);">' +
                                        '<span style="font-size:13px;font-weight:800;color:var(--pink);display:flex;align-items:center;gap:6px;">' +
                                            '<span style="font-size:10px;color:var(--text-3);font-weight:600;">'+fHome+'</span>' +
                                            '<span>'+g.home+' – '+g.away+'</span>' +
                                            '<span style="font-size:10px;color:var(--text-3);font-weight:600;">'+fAway+'</span>' +
                                        '</span>' +
                                        ptsBadge3(g.points) +
                                    '</div>' +
                                    '<div style="padding:8px 12px;display:flex;flex-direction:column;gap:6px;">' +
                                        g.users.map(function(u) { return '<span style="font-size:13px;color:var(--text-1);font-weight:600;">👤 '+u+'</span>'; }).join('') +
                                    '</div>' +
                                '</div>';
                            }).join('') +
                            (notPred3.length > 0 ?
                                '<div style="background:var(--card-2);border:1px solid var(--border);border-radius:10px;overflow:hidden;">' +
                                '<div style="padding:8px 12px;background:rgba(248,113,113,0.06);border-bottom:1px solid var(--border);">' +
                                    '<span style="font-size:12px;font-weight:800;color:var(--red);">پیش‌بینی نکرده‌اند</span></div>' +
                                '<div style="padding:8px 12px;display:flex;flex-direction:column;gap:6px;">' +
                                    notPred3.map(function(u) { return '<span style="font-size:13px;color:var(--text-3);font-weight:600;">👤 '+u+'</span>'; }).join('') +
                                '</div></div>' : ''
                            );
                        usEl.appendChild(filterBox);
                    }

                    users.forEach(function(u, ui) {
                        var isOpen = openedUsers.indexOf(u.username) !== -1;
                        var userPreds = allPredictions.filter(function(p) { return p.username === u.username; });
                        var initial = u.username.charAt(0).toUpperCase();
                        var accord = document.createElement('div');
                        accord.className = 'user-accord' + (isOpen ? ' open' : '');
                        accord.style.animationDelay = (ui * 0.04) + 's';

                        var headDiv = document.createElement('div');
                        headDiv.className = 'user-accord-head';
                        headDiv.innerHTML =
                            '<div class="user-accord-name">' +
                                '<div class="user-accord-avatar">' + initial + '</div>' +
                                u.username +
                            '</div>' +
                            '<div class="accord-toggle">▾</div>';
                        headDiv.addEventListener('click', function() { toggleUserAccordion(u.username); });

                        var bodyDiv = document.createElement('div');
                        bodyDiv.className = 'user-accord-body';
                        bodyDiv.id = 'body-' + u.username;

                        accord.appendChild(headDiv);
                        accord.appendChild(bodyDiv);
                        usEl.appendChild(accord);

                        if (isOpen) {
                            folders.forEach(function(folder) {
                                var folderMatches = matches.filter(function(m) { return String(m.folder_id) === String(folder.id); });
                                if (folderMatches.length === 0) return;

                                var folderKey = u.username + '_' + folder.id;
                                var isFolderOpen = openedUserFolders.indexOf(folderKey) !== -1;

                                var innerFolder = document.createElement('div');
                                innerFolder.className = 'inner-folder' + (isFolderOpen ? ' open' : '');

                                var fHead = document.createElement('div');
                                fHead.className = 'inner-folder-head';
                                fHead.innerHTML =
                                    '<span>📁 ' + folder.name + '</span>' +
                                    '<span style="font-size:11px;color:var(--text-3);">' + (isFolderOpen ? '▴ بستن' : '▾ باز کردن') + '</span>';
                                fHead.addEventListener('click', function(e) { e.stopPropagation(); toggleFolderAccordion(folderKey); });

                                var fBody = document.createElement('div');
                                fBody.className = 'inner-folder-body';

                                folderMatches.forEach(function(match) {
                                    var pred = userPreds.find(function(p) { return String(p.match_id) === String(match.id); });
                                    var homeName = teamsMap[match.team_home_id] || '—';
                                    var awayName = teamsMap[match.team_away_id] || '—';
                                    var realH = (match.home_score !== null && match.home_score !== undefined) ? match.home_score : '—';
                                    var realA = (match.away_score !== null && match.away_score !== undefined) ? match.away_score : '—';

                                    var matchRow = document.createElement('div');
                                    matchRow.className = 'pred-match-row';

                                    var hasPred = !!pred && pred.home_prediction !== null && pred.away_prediction !== null
                                        && pred.home_prediction !== '' && pred.away_prediction !== '';

                                    // ─── آیا زمان بازی فرا رسیده؟ ───
                                    var matchStarted = isMatchStarted(match);
                                    // مدیر همیشه همه پیش‌بینی‌ها را می‌بیند
                                    // کاربر: پیش‌بینی خودش را همیشه، پیش‌بینی بقیه را فقط بعد از شروع بازی
                                    var isViewingOwnProfile = (u.username === currentLoggedInUser);
                                    var canSeePred = currentUserRole === 'admin' || isViewingOwnProfile || matchStarted;

                                    // ─── محاسبه امتیاز کسب‌شده از این بازی (در صورت ثبت نتیجه) ───
                                    var matchPointsBadge = '';
                                    if (hasPred && canSeePred && realH !== '—' && realA !== '—') {
                                        var prH = parseInt(pred.home_prediction), prA = parseInt(pred.away_prediction);
                                        var reH = parseInt(realH), reA = parseInt(realA);
                                        if (!isNaN(prH) && !isNaN(prA) && !isNaN(reH) && !isNaN(reA)) {
                                            var rW = reH > reA ? 1 : reA > reH ? 2 : 0;
                                            var pW = prH > prA ? 1 : prA > prH ? 2 : 0;
                                            var pts;
                                            if (prH === reH && prA === reA) pts = 10;
                                            else if (rW === pW && (reH-reA) === (prH-prA)) pts = 7;
                                            else if (rW === pW) pts = 5;
                                            else pts = 2;
                                            matchPointsBadge = '<span class="lb-last-points" style="margin-top:4px;">+' + pts + ' امتیاز</span>';
                                        }
                                    }

                                    var predHtml;
                                    if (!canSeePred) {
                                        // زمان بازی نرسیده و این کاربر دیگری است
                                        predHtml = '<div style="font-size:10px;color:var(--text-3);background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 8px;">🔒 قبل از بازی</div>';
                                    } else if (hasPred) {
                                        predHtml = '<div class="pred-score user-pred"><span>' + pred.home_prediction + '</span><span style="color:var(--text-3)">-</span><span>' + pred.away_prediction + '</span></div><div class="pred-label">پیش‌بینی</div>' + matchPointsBadge;
                                    } else {
                                        predHtml = '<div class="no-pred-badge">ثبت نشده</div>';
                                    }
                                    var realHtml = realH !== '—'
                                        ? '<div class="pred-score real-score"><span>' + realH + '</span><span style="color:var(--text-3)">-</span><span>' + realA + '</span></div><div class="pred-label">نتیجه واقعی</div>'
                                        : '<div style="font-size:10px;color:var(--text-3);">در انتظار</div>';

                                    matchRow.innerHTML =
                                        '<span class="pred-team right">' + homeName + '</span>' +
                                        '<div class="pred-center">' + predHtml + realHtml + '</div>' +
                                        '<span class="pred-team left">' + awayName + '</span>';
                                    fBody.appendChild(matchRow);
                                });

                                innerFolder.appendChild(fHead);
                                innerFolder.appendChild(fBody);
                                bodyDiv.appendChild(innerFolder);
                            });
                        }
                    });
                }

            } catch (err) {
                console.error('خطا در بارگذاری نتایج:', err);
                var errHtml = '<p style="text-align:center;color:#ff3b30;padding:20px;font-size:13px;">⚠️ خطا: ' + err.message + '</p>';
                if (lbEl) lbEl.innerHTML = errHtml;
                if (chEl) chEl.innerHTML = errHtml;
                if (usEl) usEl.innerHTML = errHtml;
            }
        }

        function toggleUserAccordion(username) {
            var idx = openedUsers.indexOf(username);
            if (idx !== -1) {
                openedUsers.splice(idx, 1);
                openedUserFolders = openedUserFolders.filter(function(k) { return k.indexOf(username + '_') !== 0; });
            } else {
                openedUsers.push(username);
            }
            initResultsPage();
        }

        function toggleFolderAccordion(folderKey) {
            var idx = openedUserFolders.indexOf(folderKey);
            if (idx !== -1) { openedUserFolders.splice(idx, 1); }
            else { openedUserFolders.push(folderKey); }
            initResultsPage();
        }

        // ─── بکاپ اکسل (فقط برای ادمین) ───
        document.addEventListener('DOMContentLoaded', function() {
            var btn = document.getElementById('backupBtn');
            var role = localStorage.getItem('userRole') || 'user';
            if (btn && role === 'admin') {
                btn.style.display = '';
                btn.addEventListener('click', exportToExcel);
            }
        });

        async function exportToExcel() {
            var btn = document.getElementById('backupBtn');
            if (btn) { btn.innerHTML = '<span dir="rtl">⏳ در حال دریافت...</span>'; btn.disabled = true; }

            try {
                var results = await Promise.all([
                    supabaseClient.from('project_users').select('username').order('username', {ascending: true}),
                    supabaseClient.from('matches').select('*').order('id', {ascending: true}),
                    supabaseClient.from('teams').select('*'),
                    supabaseClient.from('folders').select('*').order('id', {ascending: true}),
                    supabaseClient.from('predictions').select('*')
                ]);

                var users        = results[0].data || [];
                var matches      = results[1].data || [];
                var teams        = results[2].data || [];
                var folders      = results[3].data || [];
                var allPreds     = results[4].data || [];

                var teamsMap = {};
                teams.forEach(function(t) { teamsMap[t.id] = t.name; });

                // ایندکس پیش‌بینی‌ها: "username_matchId" -> predStr
                var predIndex = {};
                allPreds.forEach(function(p) {
                    var key = p.username + '_' + String(p.match_id);
                    if (!predIndex[key] && p.home_prediction !== null && p.away_prediction !== null) {
                        predIndex[key] = p.home_prediction + ' - ' + p.away_prediction;
                    }
                });

                var wb = XLSX.utils.book_new();

                // یک شیت برای هر پوشه
                folders.forEach(function(folder) {
                    var folderMatches = matches.filter(function(m) {
                        return String(m.folder_id) === String(folder.id);
                    });
                    if (folderMatches.length === 0) return;

                    // ردیف هدر: کاربر | بازی۱ | بازی۲ | ...
                    var headerRow = ['کاربر'];
                    folderMatches.forEach(function(m) {
                        var home = teamsMap[m.team_home_id] || '?';
                        var away = teamsMap[m.team_away_id] || '?';
                        headerRow.push(home + ' - ' + away);
                    });

                    var sheetData = [headerRow];

                    // یک ردیف برای هر کاربر
                    users.forEach(function(u) {
                        var row = [u.username];
                        folderMatches.forEach(function(m) {
                            var key = u.username + '_' + String(m.id);
                            row.push(predIndex[key] || '—');
                        });
                        sheetData.push(row);
                    });

                    var ws = XLSX.utils.aoa_to_sheet(sheetData);

                    // عرض ستون‌ها
                    var cols = [{wch: 18}];
                    folderMatches.forEach(function() { cols.push({wch: 22}); });
                    ws['!cols'] = cols;

                    var sheetName = folder.name.substring(0, 31);
                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                });

                var today = new Date();
                var dateStr = today.getFullYear() + '-' + (today.getMonth()+1) + '-' + today.getDate();
                XLSX.writeFile(wb, 'predictions-backup-' + dateStr + '.xlsx');

            } catch(err) {
                console.error('Excel export error:', err);
                alert('خطا در ساخت فایل اکسل: ' + err.message);
            } finally {
                if (btn) { btn.innerHTML = '<span dir="rtl">📥 بکاپ</span>'; btn.disabled = false; }
            }
        }
    </script>
    
</body>
</html>

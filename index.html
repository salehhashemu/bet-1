<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | پیش‌بینی جام جهانی 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page"> <div class="login-container">
        <div class="glow-sphere"></div>

        <div class="login-header">
            <div class="brand-icon">🏆</div>
            <h2>پیش‌بینی جام جهانی 2026</h2>
            <p>جهت ورود به پنل، رمز عبور خود را وارد کنید</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="password" placeholder=" " required autocomplete="off">
                <label for="password">رمز عبور اختصاصی</label>
            </div>

            <button type="submit" class="btn-submit">
                <span>ورود به استادیوم</span>
                <span class="btn-icon">⚡</span>
            </button>
        </form>

        <div class="login-footer">
            <a href="#" id="forgotPasswordBtn" class="forgot-link">رمز عبور را فراموش کرده‌ام؟</a>
        </div>
    </div>

    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">💬</div>
            <h3>فراموشی رمز عبور</h3>
            <p>برای بازیابی رمز عبور خود، لطفا از طریق تلگرام با پشتیبانی در ارتباط باشید:</p>
            <a href="https://t.me/sglch" target="_blank" class="telegram-link">@sglch</a>
            <button id="closeModalBtn" class="btn-close">متوجه شدم</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
